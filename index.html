<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Assistant CV SPE</title>
    <style>
        body { font-family: sans-serif; display: flex; gap: 20px; padding: 20px; background: #f4f7f6; }
        .form-side { width: 40%; background: white; padding: 20px; border-radius: 12px; }
        .preview-side { width: 60%; background: #525659; padding: 20px; }
        #cv-paper { width: 210mm; min-height: 297mm; background: white; padding: 10mm; }
        input, textarea, select { width: 100%; margin-bottom: 10px; padding: 8px; }
    </style>
</head>
<body>
<div class="form-side">
    <h2>👤 État Civil</h2>
    <input type="text" id="nom" placeholder="Nom" oninput="update()">
    <input type="text" id="tel" placeholder="Téléphone" oninput="update()">
    <input type="text" id="email" placeholder="Email" oninput="update()">
    <input type="text" id="langues" placeholder="Langues" oninput="update()">
    <h2>🎯 Métier</h2>
    <select id="metier" onchange="update()">
        <option value="Garde">Garde d'enfants</option>
        <option value="ADVD">ADVD</option>
    </select>
    <textarea id="profil" placeholder="Accroche..." oninput="update()"></textarea>
    <button onclick="saveData()">💾 Sauvegarder</button>
</div>
<div class="preview-side"><div id="cv-paper"></div></div>
<script>
    function update() {
        const paper = document.getElementById('cv-paper');
        paper.innerHTML = `<h1>${document.getElementById('nom').value}</h1><p>${document.getElementById('metier').value}</p>`;
    }
    function saveData() {
        const data = { nom: document.getElementById('nom').value, metier: document.getElementById('metier').value };
        console.log(JSON.stringify(data));
    }
</script>
</body>
</html>
